<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Expense & Budget Visualizer — track your daily spending" />
    <title>Expense &amp; Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css" />
    <!-- Chart.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  </head>
  <body>
    <header class="app-header">
      <h1>Expense &amp; Budget Visualizer</h1>
      <button id="btn-theme-toggle" type="button" aria-label="Toggle dark/light mode">Dark Mode</button>
    </header>
    <main>

      <!-- Total Balance Display -->
      <section aria-labelledby="balance-heading">
        <h2 id="balance-heading">Total Balance</h2>
        <p id="total-balance" aria-live="polite" aria-atomic="true">0</p>
      </section>

      <!-- Transaction Input Form -->
      <section aria-labelledby="form-heading">
        <h2 id="form-heading">Add Transaction</h2>
        <form id="transaction-form" novalidate>
          <div>
            <label for="input-name">Item Name</label>
            <input
              type="text"
              id="input-name"
              name="name"
              placeholder="e.g. Coffee"
              aria-label="Item name"
              autocomplete="off"
            />
          </div>
          <div>
            <label for="input-amount">Amount</label>
            <input
              type="number"
              id="input-amount"
              name="amount"
              placeholder="0.00"
              min="0.01"
              step="0.01"
              aria-label="Transaction amount"
            />
          </div>
          <div>
            <label for="input-category">Category</label>
            <select id="input-category" name="category" aria-label="Spending category">
              <option value="" disabled selected>Select a category</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Fun">Fun</option>
            </select>
          </div>
          <div id="form-error" role="alert" hidden></div>
          <button type="submit" id="btn-add" aria-label="Add transaction">Add Transaction</button>
        </form>
      </section>

      <!-- Transaction List -->
      <section aria-labelledby="list-heading">
        <h2 id="list-heading">Transactions</h2>
        <div>
          <label for="sort-select">Sort by</label>
          <select id="sort-select" aria-label="Sort transactions">
            <option value="none">Default</option>
            <option value="amount-asc">Amount ↑</option>
            <option value="amount-desc">Amount ↓</option>
            <option value="category-asc">Category A–Z</option>
          </select>
        </div>
        <p id="empty-message">No transactions recorded yet.</p>
        <ul id="transaction-list" aria-label="Transaction list"></ul>
      </section>

      <!-- Spending Limit -->
      <section aria-labelledby="limit-heading">
        <h2 id="limit-heading">Spending Limit</h2>
        <div>
          <label for="spending-limit-input">Limit per Category ($)</label>
          <input
            type="number"
            id="spending-limit-input"
            name="spending-limit"
            placeholder="e.g. 100"
            min="0.01"
            step="0.01"
            aria-label="Spending limit per category"
          />
          <button type="button" id="btn-set-limit" aria-label="Set spending limit">Set Limit</button>
        </div>
      </section>

      <!-- Pie Chart -->
      <section aria-labelledby="chart-heading">
        <h2 id="chart-heading">Spending by Category</h2>
        <canvas id="chart-canvas" aria-label="Pie chart of spending by category" role="img"></canvas>
        <p id="chart-empty">Add transactions to see your spending chart.</p>
      </section>
    </main><!-- /.main-content -->

    <script src="js/app.js" type="module"></script>
  </body>
</html>
